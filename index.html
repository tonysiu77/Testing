<form id="contactForm" action="https://formsubmit.co/fooncoresolutions@gmail.com" method="POST">
  <!-- FormSubmit settings -->
  <input type="hidden" name="_subject" value="New Consultation Request" />
  <input type="hidden" name="_captcha" value="false" />
  <input type="hidden" name="_template" value="table" />

  <!-- Anti-spam honeypot -->
  <input type="hidden" name="_honey" style="display:none" />

  <!-- Redirect URL after submission -->
  <input type="hidden" name="_next" value="https://fooncore.github.io/Testing/thankyou.html" />

  <!-- Auto reply message -->
  <input
    type="hidden"
    name="_autoresponse"
    value="
    Dear Customer,

    Thank you for contacting Fooncore Solutions.

    We have received your consultation request.

    Our team will respond within 1 business day.

    For urgent matters, email: fooncoresolutions@gmail.com

    Best regards,
    Fooncore Solutions
    Your One-Stop IT Management Partner
    "
  />

  <!-- Form fields -->
  <div class="form-row" style="display:flex; gap:20px; flex-wrap:wrap;">
    <div class="form-group" style="flex:1; min-width:200px;">
      <label for="name">Full Name *</label>
      <input
        type="text"
        id="name"
        name="name"
        placeholder="John Doe"
        required
        style="width:100%; padding:10px; border-radius:5px; border:1px solid #333;"
      />
    </div>

    <div class="form-group" style="flex:1; min-width:200px;">
      <label for="email">Email Address *</label>
      <input
        type="email"
        id="email"
        name="email"
        placeholder="john@company.com"
        required
        style="width:100%; padding:10px; border-radius:5px; border:1px solid #333;"
      />
    </div>
  </div>

  <div class="form-group" style="margin-top:15px;">
    <label for="company">Company Name</label>
    <input
      type="text"
      id="company"
      name="company"
      placeholder="Your company"
      style="width:100%; padding:10px; border-radius:5px; border:1px solid #333;"
    />
  </div>

  <div class="form-group" style="margin-top:15px;">
    <label for="message">How Can We Help? *</label>
    <textarea
      id="message"
      name="message"
      rows="4"
      maxlength="500"
      placeholder="Tell us about your IT challenges or goals..."
      required
      style="width:100%; padding:10px; border-radius:5px; border:1px solid #333;"
    ></textarea>
    <p class="char-count" style="margin-top:5px; font-size:0.9em;">
      <span id="char-count">0</span>/500
    </p>
  </div>

  <p id="form-error" class="form-error" style="display:none; color:red; margin-top:10px;">
    Something went wrong. Please try again.
  </p>

  <button
    type="submit"
    class="btn-primary"
    id="submit-btn"
    style="
      padding:12px 20px;
      background-color:#00C7E6;
      color:#fff;
      border:none;
      border-radius:5px;
      cursor:pointer;
      font-size:1em;
      margin-top:15px;
    "
  >
    <span id="btn-label">Schedule Your Consultation</span>
  </button>

  <p class="form-note" style="margin-top:10px; font-size:0.9em; color:#ccc;">
    We respect your privacy. Your information will never be shared.
  </p>
</form>
